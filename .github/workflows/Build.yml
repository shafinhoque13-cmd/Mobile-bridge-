name: Build Mobile Bridge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # This fixes the Node.js 20 deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x

    - name: Build Bridge
      run: dotnet build MobileBridge.csproj --configuration Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MobileBridge-DLL
        path: bin/Release/net472/MobileBridge.dll
        
