name: Build Mobile Bridge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # Already latest

    - name: Setup .NET
      uses: actions/setup-dotnet@v4 # Already latest
      with:
        dotnet-version: 6.0.x

    - name: Build Bridge
      run: dotnet build MobileBridge.csproj --configuration Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4 # Already latest
      with:
        name: MobileBridge-DLL
        path: bin/Release/net472/MobileBridge.dll
        
